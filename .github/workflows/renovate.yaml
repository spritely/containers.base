name: Renovate

on:
  workflow_dispatch:
  # Daily at 12:00AM EST (5:00AM UTC), with a second run at 12:10AM EST (5:10AM UTC)
  # Tier 0 (root dependency): two runs 10 minutes apart.
  # Run 1 creates PRs, CI validates, Run 2 auto-merges.
  schedule:
    - cron: '0 5 * * *'
    - cron: '10 5 * * *'

jobs:
  renovate:
    runs-on: ubuntu-24.04
    steps:
      - name: Generate token
        id: renovate-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ secrets.RENOVATE_APP_ID }}
          private-key: ${{ secrets.RENOVATE_APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Renovate
        uses: renovatebot/github-action@b67590ea780158ccd13192c22a3655a5231f869d # v46.1.8
        with:
          token: ${{ steps.renovate-token.outputs.token }}
        env:
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          RENOVATE_ONBOARDING: false
